appId: com.kanade.desktop
productName: YouTube
directories:
  output: out

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.music
  icon: build/icon.icns

publish:
  provider: github

dmg:
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
